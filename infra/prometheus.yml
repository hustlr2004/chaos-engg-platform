global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: cadvisor
    scrape_interval: 5s
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: chaos-api
    scrape_interval: 10s
    metrics_path: /metrics
    static_configs:
      - targets:
          - chaos-api:4000

  - job_name: target-apps
    metrics_path: /metrics
    static_configs:
      - targets:
          - payment-api:5001
          - auth-service:5002
