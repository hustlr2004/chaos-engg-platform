global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: payment-api
    static_configs:
      - targets:
          - payment-api:5001

  - job_name: chaos-api
    static_configs:
      - targets:
          - chaos-api:4000
